<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Mi Carrito</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .header-store {
            background-color: #ffffff;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
        }
        .header-store h1 {
            margin: 0;
            color: #e67e22;
            font-size: 1.8rem;
        }
        .nav-store {
            display: flex;
            align-items: center;
            gap: 25px;
        }
        .nav-store a {
            text-decoration: none;
            font-weight: 600;
            color: #333;
        }
        .cart-card {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        /* Colores botones del carrito */
        #btn-empty {
            background-color: transparent;
            color: #e67e22;
            border: 2px solid #e67e22;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
        }
        #btn-checkout {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: inherit;
            margin-left: 10px;
        }
    </style>
</head>
<body>

    <header class="header-store">
        <h1><img src="/emojipizza.png" width="30" style="vertical-align: middle;"> Food Store</h1>
        <nav class="nav-store">
            <a href="/src/pages/store/home/home.html">Inicio</a>
            <a href="/src/pages/store/cart/cart.html" style="color: #e67e22;">🛒 Mi Carrito</a>
        </nav>
    </header>

    <main class="cart-card">
        <h2 style="color: #e67e22; border-bottom: 2px solid #f1c40f; padding-bottom: 10px;">Tu Pedido</h2>
        <div id="cart-container">
            <p>Cargando tus delicias...</p>
        </div>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        <div style="text-align: right;">
            <h2 style="margin-bottom: 15px;">Total: $<span id="cart-total">0.00</span></h2>
            <button id="btn-empty">Vaciar Carrito</button>
            <button id="btn-checkout">Finalizar Compra</button>
        </div>
    </main>

    <script type="module" src="./cart.ts"></script>

    <footer style="text-align: center; padding: 20px; border-top: 1px solid #eee; margin-top: 40px;">
        © 2026 Food Store. Contacto: <a href="mailto:info@foodstore.com">info@foodstore.com</a>
    </footer>

</body>
</html>
