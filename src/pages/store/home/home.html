<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catálogo - Tienda Virtual</title>
    </head>
  <body style="font-family: Arial, sans-serif; margin: 0; padding: 0;">
    
    <header style="background-color: #f8f9fa; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd;">
      <h1 style="margin: 0;">🍕 Menú Principal</h1>
      <nav>
        <li><a href="/src/pages/store/cart/cart.html" style="font-weight: bold; color: #e67e22;">🛒 Mi Carrito</a></li>
        <button id="btn-logout" style="padding: 8px 12px; cursor: pointer;">Cerrar Sesión</button>
      </nav>
    </header>

    <main style="display: flex; gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto;">
      
      <aside style="width: 250px; border-right: 1px solid #eee; padding-right: 20px;">
        <h2>Categorías</h2>
        <div id="lista-categorias" style="display: flex; flex-direction: column; gap: 10px;">
          </div>
      </aside>

      <section style="flex-grow: 1;">
        
        <div style="margin-bottom: 20px;">
          <input
            type="text"
            id="search-input"
            placeholder="Buscar por nombre de producto..."
            style="width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px;"
          />
        </div>

        <div
          id="lista-productos"
          style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;"
        >
          </div>

      </section>
    </main>

    <script type="module" src="./home.ts"></script>
  </body>
</html>
