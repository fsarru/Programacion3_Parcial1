<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Store - Catálogo</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
        }
        /* Cabecera Unificada */
        .header-store {
            background-color: #ffffff;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
        }
        .header-store h1 {
            margin: 0;
            color: #e67e22; /* Naranja Principal */
            font-size: 1.8rem;
        }
        .nav-store {
            display: flex;
            align-items: center;
            gap: 25px;
        }
        .nav-store a {
            text-decoration: none;
            font-weight: 600;
            color: #333;
        }
        .nav-store a:hover {
            color: #e67e22;
        }
        /* Botón Logout Rojo */
        .btn-logout-style {
            padding: 8px 18px;
            cursor: pointer;
            border: 2px solid #e74c3c;
            background: transparent;
            color: #e74c3c;
            border-radius: 20px;
            font-family: inherit;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-logout-style:hover {
            background: #e74c3c;
            color: white;
        }
        /* Botones de Categoría Naranjas */
        #lista-categorias button {
            background: white;
            border: 2px solid #e67e22;
            color: #e67e22;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: all 0.2s;
        }
        #lista-categorias button:hover {
            background: #e67e22;
            color: white;
        }
    </style>
</head>
<body>
    
    <header class="header-store">
      <h1><img src="/emojipizza.png" width="30" style="vertical-align: middle;"> Food Store</h1>
      <nav class="nav-store">
        <a href="/src/pages/store/home/home.html">Inicio</a>
        <a href="/src/pages/store/cart/cart.html" style="color: #e67e22;">🛒 Mi Carrito</a>
        <button id="btn-logout" class="btn-logout-style">Cerrar Sesión</button>
      </nav>
    </header>

    <main style="display: flex; gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto;">
      <aside style="width: 250px; padding-right: 20px;">
        <h2 style="color: #333;">Categorías</h2>
        <div id="lista-categorias" style="display: flex; flex-direction: column; gap: 10px;"></div>
      </aside>

      <section style="flex-grow: 1;">
        <div style="margin-bottom: 25px;">
          <input type="text" id="search-input" placeholder="¿Qué quieres comer hoy?..." 
                 style="width: 100%; padding: 14px; font-size: 16px; border: 2px solid #e67e22; border-radius: 25px; outline: none; font-family: inherit;" />
        </div>
        <div id="lista-productos" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;"></div>
      </section>
    </main>

    <script type="module" src="./home.ts"></script>
  </body>
</html>
