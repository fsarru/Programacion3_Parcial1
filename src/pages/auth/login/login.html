<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Food Store - Iniciar Sesión</title>
    <link rel="stylesheet" href="./login.css">
</head>
<body>
    <header>
        <h1>Food Store</h1>
        <h2>Iniciar Sesión</h2>
    </header>

    <form id="form">
        <fieldset>
            <label for="email"><strong>Email:</strong></label><br>       
            <input type="email" id="email" name="email" 
            placeholder="tucorreo@ejemplo.com" required><br><br>

            <label for="password"><strong>Contraseña:</strong></label><br>       
            <input type="password" id="password" name="password"
            placeholder="Mínimo 6 caracteres" required><br><br>
            <br>
            <button type="submit">Ingresar</button>
            
            <p>¿No tenés cuenta? <a href='../registro/registro.html'><strong>Registrate acá</strong></a></p>
        </fieldset>
    </form><br>

    <script type="module" src="./login.ts"></script>
</body>
</html>
