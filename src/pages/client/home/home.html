<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Food Store - Catálogo</title>
    <link rel="stylesheet" href="../../../../style.css">
</head>
<body>
    <header style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #fff; border-bottom: 1px solid #ddd;">
        <h1 style="margin: 0;">
            <img src="/emojipizza.png" width="30" alt="emoji pizza">
            Food Store
        </h1>
        <nav>
            <ul style="list-style: none; display: flex; gap: 20px; margin: 0;">
                <li><a href='#'>Inicio</a></li>
                <li><a href="/src/pages/client/cart/cart.html" style="font-weight: bold; color: #e67e22;">Mi Carrito</a></li>
                <li><button id="btn-logout" style="cursor:pointer; border:none; background:none; color:red;">Cerrar Sesión</button></li>
            </ul>
        </nav>
    </header>

    <div style="display: flex; gap: 30px; padding: 20px; max-width: 1200px; margin: 0 auto;">
        <aside style="width: 200px;"> 
            <h2 style="font-size: 1.2rem;">Categorías</h2> 
            <ul id="lista-categorias" style="list-style: none; padding: 0; line-height: 2;">
                </ul> 
        </aside>

        <main style="flex: 1;">
            <div style="margin-bottom: 25px; background: #eee; padding: 15px; border-radius: 8px;">
                <label for="buscarProducto" style="font-weight: bold;">Buscar producto:</label>
                <input id="buscarProducto" type="text" placeholder="Ej: Hamburguesa" style="padding: 8px; width: 60%; border: 1px solid #ccc; border-radius: 4px;"/>
            </div>

            <section id="lista-productos">
                <h2 style="border-bottom: 2px solid #e67e22; padding-bottom: 10px;">Productos destacados</h2>
                <div id="contenedor-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px;"></div>
            </section>
        </main>
    </div>

    <footer style="text-align: center; padding: 20px; border-top: 1px solid #eee; margin-top: 40px;">
        © 2026 Food Store. Contacto: <a href="mailto:info@foodstore.com">info@foodstore.com</a>
    </footer>

    <script type="module" src="./home.ts"></script>
</body>
</html>
